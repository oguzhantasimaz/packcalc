run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - unconvert
    - prealloc
    - bodyclose

linters-settings:
  revive:
    rules:
      - name: var-naming
      - name: exported
        disabled: true
  errcheck:
    check-type-assertions: true
    exclude-functions:
      - (io.Closer).Close
      - (*github.com/redis/go-redis/v9.Client).Close

issues:
  exclude-rules:
    # Test files commonly ignore errors from helpers and use short-lived
    # response bodies. Excluding these linters from _test.go keeps the
    # signal-to-noise high on production code, where they matter most.
    - path: _test\.go
      linters:
        - errcheck
        - prealloc
        - bodyclose
  max-issues-per-linter: 0
  max-same-issues: 0
