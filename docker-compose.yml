# Local dev stack. Brings up the API and Redis. The API selects the
# Redis store automatically because REDIS_URL is set; remove the var
# (or override with `docker compose run --rm -e REDIS_URL= api`) to
# fall back to the in-memory store.

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: packcalc:dev
    ports:
      - "8080:8080"
    environment:
      ENV: dev
      LOG_LEVEL: debug
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: "http://localhost:3000"
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 1s
      retries: 5
