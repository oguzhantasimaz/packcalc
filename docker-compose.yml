# Local dev stack. `docker compose up` brings the whole thing up:
#   - web   (Next.js UI)    → http://localhost:3000
#   - api   (Go HTTP API)   → http://localhost:8080  · /docs for Swagger UI
#   - redis (PackStore)     → redis://localhost:6379
#
# The API selects the Redis store automatically because REDIS_URL is set
# in this file. To run the API with the in-memory store instead, use:
#   docker compose run --rm -e REDIS_URL= api

services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* is inlined at build time. The browser runs on the
        # host, so this must be a host-reachable URL — not `http://api`.
        NEXT_PUBLIC_API_URL: http://localhost:8080
    image: packcalc-web:dev
    ports:
      - "3000:3000"
    depends_on:
      - api

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: packcalc:dev
    ports:
      - "8080:8080"
    environment:
      ENV: dev
      LOG_LEVEL: debug
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: "http://localhost:3000"
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 1s
      retries: 5
